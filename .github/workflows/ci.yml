name: Fintech CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          
      - name: Make Maven Wrapper Executable
        working-directory: fintech
        run: chmod +x mvnw
        
      - name: Build and Run Tests
        working-directory: fintech
        run: ./mvnw clean test
